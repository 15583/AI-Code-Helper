spring:
  application:
    name: ai-code-helper
  profiles:
    active: local
server:
  port: 8081
  servlet:
    context-path: /api
  tomcat:
    uri-encoding: UTF-8
    relaxed-query-chars: '[,],|,{,},^,\,`,",<,>'
langchain4j:
  community:
    dashscope:
      chat-model:
        model-name: qwen-max
        api-key: ${DASHSCOPE_API_KEY:your-api-key-here}
      embedding-model:
        model-name: text-embedding-v4
        api-key: ${DASHSCOPE_API_KEY:your-api-key-here}
      streaming-chat-model:
        model-name: qwen-max
        api-key: ${DASHSCOPE_API_KEY:your-api-key-here}
bigmodel:
  api-key: ${BIGMODEL_API_KEY:your-api-key-here}
